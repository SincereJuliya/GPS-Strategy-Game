<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Final Scene — System</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0a0e1a;
    color: #e8e8f0;
    min-height: 100vh;
    padding: 16px;
  }
  h1 { font-size: 22px; margin: 4px 0 4px; }
  .sub { color: #8a8aa0; font-size: 13px; margin-bottom: 12px; }
  .timer {
    display: inline-block;
    background: #1f2942;
    color: #ffd54a;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 14px;
  }
  .panel { background: #131826; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  .panel h2 { font-size: 14px; margin: 0 0 10px; color: #8a8aa0; text-transform: uppercase; letter-spacing: 0.5px; }
  .player {
    display: flex; flex-direction: column;
    padding: 12px; border-radius: 10px;
    background: #1c2336; margin-bottom: 8px;
    border: 1px solid transparent;
  }
  .player.present { border-color: #2db84d; }
  .player.absent  { opacity: 0.55; }
  .player.done    { background: #1a3a25; border-color: #2db84d; }
  .player.wrong   { background: #3a1a1a; border-color: #c8413a; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #2a3350; color: #b8c0d8; }
  .badge.green { background: #2db84d; color: #fff; }
  .badge.red { background: #c8413a; color: #fff; }
  .badge.purple { background: #6a5acd; color: #fff; }
  .username { font-weight: 600; flex: 1; }
  .result { font-family: ui-monospace, monospace; font-size: 13px; color: #b8c0d8; }
  .result.correct { color: #2db84d; }
  .result.wrong   { color: #ff8c75; }
  button {
    padding: 8px 14px; background: #ffd54a; color: #1a1a2a;
    border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  button:disabled { background: #3a4258; color: #8a8aa0; cursor: not-allowed; }
  .guess-area { display: block; margin-top: 10px; }
  .anon-list { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .chip {
    padding: 6px 10px; background: #ffd54a; color: #1a1a2a;
    border-radius: 6px; font-family: ui-monospace, monospace; font-weight: 600; font-size: 12px;
    cursor: pointer; user-select: none;
  }
  .chip:hover { background: #fff; }
  .scanned-banner {
    background: #ffd54a; color: #1a1a2a; padding: 8px;
    border-radius: 6px; margin-bottom: 6px; text-align: center; font-weight: 600;
  }
  .empty { color: #8a8aa0; font-style: italic; font-size: 13px; }
  .ok { color: #2db84d; font-size: 13px; margin-top: 6px; }
  input[type=text] {
    width: 100%; padding: 6px; border-radius: 4px;
    border: 1px solid #3a4258; background: #0a0e1a; color: #e8e8f0; margin-top: 4px;
  }
</style>
</head>
<body>
  <h1>🎯 Final Scene</h1>
  <div class="sub">
    Take each Opposition player. Scan their QR, then guess their AGENT-ID.
    <br>Each correct guess scores points for System. The game ends when everyone is processed or time runs out.
    <span id="timer" class="timer">--:--</span>
  </div>

  <div class="panel">
    <h2>Opposition lineup</h2>
    <div id="players"></div>
  </div>

<script>
const API_BASE = "__API_BASE__";
const tg = (typeof Telegram !== "undefined" && Telegram.WebApp) ? Telegram.WebApp : null;
if (tg) tg.expand();

const PLAYER_ID = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.id : null;

let stateData = null;
let openPlayerId = null;
let scannedFor = {};

async function fetchState() {
  try {
    const r = await fetch(API_BASE + "/api/finale/state");
    const d = await r.json();
    if (!d.ok) {
      document.body.innerHTML = "<h1>Not in finale</h1><p>" + (d.message || "") + "</p>";
      return;
    }
    stateData = d;
    render();
  } catch (e) { console.error(e); }
}

function fmtTime(sec) {
  if (sec == null) return "--:--";
  const m = Math.floor(sec / 60), s = sec % 60;
  return m + ":" + String(s).padStart(2, "0");
}

function render() {
  const stage = stateData.stage;
  document.getElementById("timer").textContent =
    (stage === "rendezvous" ? "Rendezvous: " : "Identification: ") + fmtTime(stateData.remaining_sec);

  const pl = document.getElementById("players");
  pl.innerHTML = "";
  for (const p of stateData.players) {
    const row = document.createElement("div");
    let cls = "player " + (p.present_at_rendezvous ? "present" : "absent");
    if (p.final_result && !p.final_result.correct) cls += " wrong";
    else if (p.verified_during_game || p.auto_identified || (p.final_result && p.final_result.correct)) cls += " done";
    row.className = cls;

    let statusHtml;
    if (p.verified_during_game) statusHtml = `<span class="badge green">verified mid-game</span>`;
    else if (p.auto_identified)  statusHtml = `<span class="badge purple">no-show (auto)</span>`;
    else if (p.present_at_rendezvous) statusHtml = `<span class="badge green">here</span>`;
    else statusHtml = `<span class="badge red">not here</span>`;

    let rightSide;
    if (p.verified_during_game) {
      rightSide = `<div class="result correct">→ ${p.verified_during_game}</div>`;
    } else if (p.auto_identified) {
      rightSide = `<div class="result">→ ${p.anonymous_id}</div>`;
    } else if (p.final_result) {
      const cls = p.final_result.correct ? "correct" : "wrong";
      const mark = p.final_result.correct ? "✓" : "✗";
      rightSide = `<div class="result ${cls}">${mark} ${p.final_result.guessed}</div>`;
    } else if (!p.present_at_rendezvous) {
      rightSide = `<div class="result">not yet</div>`;
    } else {
      rightSide = `<button onclick="openGuess(${p.player_id})">📷 Scan & guess</button>`;
    }

    const guessArea = (openPlayerId === p.player_id) ? renderGuessArea(p) : "";

    row.innerHTML = `<div class="row">
        <span class="username">${escapeHtml(p.username) || ("player " + p.player_id)}</span>
        ${statusHtml}${rightSide}
      </div>${guessArea}`;
    pl.appendChild(row);
  }

  const remaining = stateData.players.filter(p =>
    !p.verified_during_game && !p.auto_identified && !p.final_result && p.present_at_rendezvous
  );
  if (remaining.length === 0 && stage === "identification") {
    const banner = document.createElement("div");
    banner.className = "panel";
    banner.innerHTML = `<h2>Done</h2><div class="ok">Everyone processed — game ending…</div>`;
    pl.appendChild(banner);
  }
}

function renderGuessArea(p) {
  const qr = scannedFor[p.player_id];
  if (!qr) {
    return `<div class="guess-area">
      <button onclick="scanQR(${p.player_id})">📷 Scan QR code</button>
      <div class="empty" style="margin-top:8px;">Or paste their QR string:
        <input id="qrtxt-${p.player_id}" type="text" placeholder="GPSGAME:PLAYER:..."/>
        <button onclick="usePastedQR(${p.player_id})" style="margin-top:6px;">Use pasted</button>
      </div>
    </div>`;
  }
  const used = new Set();
  for (const x of stateData.players) {
    if (x.final_result && x.final_result.correct) used.add(x.final_result.guessed);
    if (x.verified_during_game) used.add(x.verified_during_game);
    if (x.auto_identified)     used.add(x.anonymous_id);
  }
  const available = (stateData.open_anonymous_ids || []).filter(a => !used.has(a));
  const chips = available.map(a =>
    `<div class="chip" onclick='submitGuess(${p.player_id}, ${JSON.stringify(qr)}, ${JSON.stringify(a)})'>${a}</div>`
  ).join("");
  return `<div class="guess-area">
    <div class="scanned-banner">📷 Scanned. Now guess their AGENT-ID:</div>
    <div class="anon-list">${chips || '<span class="empty">No IDs left</span>'}</div>
  </div>`;
}

function openGuess(playerId) {
  openPlayerId = openPlayerId === playerId ? null : playerId;
  render();
}

function scanQR(playerId) {
  if (tg && tg.showScanQrPopup) {
    tg.showScanQrPopup({text: "Scan an Opposition QR"}, (text) => {
      if (text) {
        scannedFor[playerId] = text;
        tg.closeScanQrPopup();
        render();
      }
      return true;
    });
  } else {
    alert("QR scanner not available in this client. Paste the QR string instead.");
  }
}

function usePastedQR(playerId) {
  const el = document.getElementById("qrtxt-" + playerId);
  const v = (el && el.value || "").trim();
  if (!v) { alert("Paste the QR text first"); return; }
  scannedFor[playerId] = v;
  render();
}

async function submitGuess(playerId, qrString, anonId) {
  if (!PLAYER_ID) { alert("Cannot identify you — please open this from the Telegram bot."); return; }
  const r = await fetch(API_BASE + "/api/finale/scan_verify", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      system_player_id: PLAYER_ID,
      qr_string: qrString,
      guessed_anonymous_id: anonId,
    })
  });
  const d = await r.json();
  if (!d.ok) { alert(d.message || "Verification failed"); return; }
  const player = stateData.players.find(p => p.player_id === playerId);
  if (player) player.final_result = { correct: !!d.correct, guessed: anonId };
  delete scannedFor[playerId];
  openPlayerId = null;
  render();
}

function escapeHtml(s) {
  return String(s || "").replace(/[<>&"]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));
}

fetchState();
setInterval(fetchState, 4000);
</script>
</body>
</html>
